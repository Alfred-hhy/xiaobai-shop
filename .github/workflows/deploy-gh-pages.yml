name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Set base path for GitHub Pages
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('src/manifest.json','utf8'));
            m.h5 = m.h5 || {};
            m.h5.router = { base: '/xiaobai-shop/' };
            fs.writeFileSync('src/manifest.json', JSON.stringify(m, null, 4));
          "

      - name: Build H5
        run: npx uni build -p h5

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/build/h5
